# Meta Image Asset Catalog
# Feature image render target: 1884x1256
# Meta image render target:    1200x628

feature_canvas:
  width: 1884
  height: 1256

meta_canvas:
  width: 1200
  height: 628

text:
  font: inter-bold.woff
  font_weight: 700
  color: "#FFFFFF"
  letter_spacing_em: -0.025
  line_height_pct: 110
  x: 90
  y: 80
  max_width: 700

templates:
  # -- Feature templates (1884x1256, no text) --
  - filename: feature-neo.png
    mode: feature
    type: static
    description: "AI, machine learning, Pulumi Neo (tags: ai, pulumi-neo)"

  - filename: feature-platform.png
    mode: feature
    type: static
    description: "Platform engineering, DevOps, Pulumi news and events (tags: platform-engineering, cloud-engineering, devops, pulumi-news, pulumi-events, community)"

  - filename: feature-rocket.png
    mode: feature
    type: static
    description: "Releases, new features, and announcements (tags: pulumi-releases, releases, release-notes, features)"

  - filename: feature-shield.png
    mode: feature
    type: static
    description: "Security, secrets, compliance, and policy (tags: security, secrets, esc, policy-as-code)"

  - filename: feature-lightbulb.png
    mode: feature
    type: static
    description: "Tutorials, how-tos, best practices, and guest posts (tags: aws, kubernetes, infrastructure-as-code, serverless, best-practices, continuous-delivery, containers, guest-post)"

  # -- Feature logo variants (1884x1256, logos composited onto circles) --
  - filename: feature-logo-1.png
    mode: feature
    type: logo
    logo_slots: 1
    placeholders:
      - { x: 602, y: 288, width: 680, height: 680 }

  - filename: feature-logo-2.png
    mode: feature
    type: logo
    logo_slots: 2
    placeholders:
      - { x: 499, y: 432, width: 390, height: 390 }
      - { x: 992, y: 432, width: 390, height: 390 }

  - filename: feature-logo-3.png
    mode: feature
    type: logo
    logo_slots: 3
    placeholders:
      - { x: 720, y: 234, width: 390, height: 390 }
      - { x: 499, y: 630, width: 390, height: 390 }
      - { x: 993, y: 630, width: 390, height: 390 }

  # -- Meta assets (1200x628) --
  # meta.png is no longer used as a template; kept for reference only.
  # meta-overlay.png: full-bleed gradient/vignette composited over the feature image
  # meta-logo.png:    Pulumi wordmark (175x44) placed bottom-left above text baseline

logos:
