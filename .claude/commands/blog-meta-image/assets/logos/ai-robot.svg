<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Antenna -->
  <line x1="12" y1="1" x2="12" y2="4" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="1" r="1" fill="#6366F1"/>
  <!-- Head -->
  <rect x="4" y="4" width="16" height="12" rx="3" ry="3" fill="#6366F1"/>
  <!-- Eyes -->
  <circle cx="8.5" cy="10" r="2" fill="white"/>
  <circle cx="15.5" cy="10" r="2" fill="white"/>
  <circle cx="9" cy="10" r="0.8" fill="#1E1B4B"/>
  <circle cx="16" cy="10" r="0.8" fill="#1E1B4B"/>
  <!-- Mouth / speaker grille -->
  <rect x="9" y="13" width="6" height="1" rx="0.5" fill="white" opacity="0.7"/>
  <!-- Ears -->
  <rect x="1.5" y="7.5" width="2" height="5" rx="1" fill="#6366F1"/>
  <rect x="20.5" y="7.5" width="2" height="5" rx="1" fill="#6366F1"/>
  <!-- Body -->
  <rect x="6" y="17" width="12" height="5.5" rx="2" ry="2" fill="#6366F1"/>
  <!-- Body detail -->
  <circle cx="12" cy="19.5" r="1.2" fill="white" opacity="0.7"/>
  <rect x="9" y="21" width="6" height="0.8" rx="0.4" fill="white" opacity="0.5"/>
</svg>
