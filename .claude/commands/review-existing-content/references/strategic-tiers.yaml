# Strategic tiers for automated existing-content review.
#
# This file is the single source of truth for two selection inputs consumed
# by `scripts/content-review/select-articles.py`:
#
#   tier      — strategic value weight in the priority score.
#                 1 = flagship  (weight 1.0): onboarding and core concepts;
#                     factual drift here is most damaging.
#                 2 = important (weight 0.6): major product areas.
#                 3 = default   (weight 0.3): everything else. Pages with no
#                     matching prefix are tier 3 — you only need an entry to
#                     promote, demote, or exclude.
#                 0 = EXCLUDED: generated or upstream-synced content. The
#                     review bot must never touch these — the generators own
#                     them and will overwrite or fight any hand edit.
#   no_retire — hard veto: review must never propose retiring a matching page,
#               regardless of evidence. This is the PRIMARY retirement
#               guardrail (retirement is no longer gated to a lane). Tier 1
#               implies no_retire; set it explicitly on lower tiers that are
#               SEO-critical or contractually required. Once GSC data is
#               flowing, high-impression entries can be regenerated from
#               thresholds; hand-curated entries stay.
#
# Matching is LONGEST PREFIX WINS (so a deeper, more specific entry overrides
# a broader one). Prefixes are repo paths, not URLs.
#
# Checklist when editing this file:
#   1. New generated/synced path under content/docs/? Add a tier-0 entry
#      (check the generator workflows in .github/workflows/ for write paths).
#   2. New top-level docs section? Add a tier entry, or accept default tier 3.
#   3. Retirement complaint about a page the team wants kept? Add
#      `no_retire: true` on the narrowest prefix that covers it.
#   4. Run `python3 scripts/content-review/test_select_articles.py` — it
#      validates this file parses and tier-0 excludes the generated trees.

tiers:
  # -- Excluded: generated content (generators own these trees) --------------
  # The review bot must never touch generated or upstream-synced pages: the
  # generators overwrite them on every release, so any hand edit is lost and
  # the review spend is wasted. CLI command reference and SDK API reference
  # are both fully generated — not ours to maintain.
  - prefix: content/docs/iac/cli/commands/
    tier: 0
    note: generated by pulumi-cli-docs.yml
  - prefix: content/docs/esc/cli/commands/
    tier: 0
    note: generated by esc-cli.yml
  - prefix: content/docs/reference/pkg/
    tier: 0
    note: auto-generated SDK API reference (regenerated on every upstream SDK release)

  # -- Tier 1: flagship (onboarding + core concepts; implies no_retire) ------
  # Highest-value onboarding and concept surfaces; factual drift here is the
  # most damaging. The top-trafficked docs areas in the trailing-6-month
  # pageview data (fct_pageviews) are exactly these onboarding/concept paths.
  - prefix: content/docs/get-started/
    tier: 1
  - prefix: content/docs/install/
    tier: 1
  - prefix: content/docs/iac/concepts/
    tier: 1
  - prefix: content/docs/iac/get-started/
    tier: 1

  # -- Tier 2: important product areas ----------------------------------------
  # Major product surfaces with material organic traffic. iac/ is the dominant
  # docs area by a wide margin, so it carries no_retire to keep the flagship
  # product out of the retirement lane (its onboarding/concepts are tier 1).
  - prefix: content/docs/iac/
    tier: 2
    no_retire: true
  - prefix: content/docs/esc/
    tier: 2
  - prefix: content/docs/deployments/
    tier: 2
  - prefix: content/docs/administration/
    tier: 2
    note: promoted from default — high organic traffic (self-hosting, access-identity)
  - prefix: content/docs/insights/
    tier: 2
  - prefix: content/docs/idp/
    tier: 2
  - prefix: content/docs/ai/
    tier: 2

  # -- Tier 3 (default): integrations, support, and other supporting material -
  # Not product areas — unmatched paths default to tier 3. reference/ stays
  # tier 3 but is pinned no_retire below (cloud-rest-api and the pre-built
  # policy packs draw steady search traffic).

  # -- no_retire on lower tiers (SEO-critical or otherwise protected) --------
  - prefix: content/docs/reference/
    tier: 3
    no_retire: true
