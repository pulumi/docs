# Reference-image manifest. Consumed by review-existing-content's
# screenshot-verification pass and useful to /glow-up's image analysis.
#
# `captured` is the date the reference reflects the live product/brand —
# refresh it (and the PNG) whenever the UI or branding changes. Automated
# reviews flag any reference older than 180 days in their PR descriptions
# until someone refreshes it; `owner` is who they should ping.
images:
  - file: pulumi-cloud-console-current.png
    area: console-overview
    description: Pulumi Cloud Console — current overall UI, including the left navigation.
    captured: 2026-05-29
    source_url: https://app.pulumi.com
    owner: docs-team
  - file: pulumi-logo-current.png
    area: branding
    # Cached convenience copy. The canonical, always-current logo is the brand
    # asset API (https://brand.pulumi.com/api) — prefer a live fetch for the
    # branding-currency check so it never rides on a stale PNG. See
    # screenshot-verification.md.
    description: Current Pulumi logo and color scheme (cached; canonical source is the brand asset API).
    captured: 2026-05-29
    source_url: https://brand.pulumi.com/api
    owner: docs-team
