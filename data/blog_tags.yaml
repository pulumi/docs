# Canonical blog tag vocabulary â€” authoring guidance, NOT build-enforced.
#
# Tags are the topical axis of a blog post (subjects: clouds, languages,
# products, scenarios). Unlike `categories` (data/blog_categories.yaml, a
# CLOSED, lint-enforced set), tags are curated-but-OPEN: prefer a tag from this
# list, and only mint a new one when nothing here fits.
#
# This file is the deduplicated, canonical survivor list after the consolidation
# in .context/tag-map.json. It mirrors the groupings used in BLOGGING.md.
#
# RULES FOR AUTHORS / AGENTS
#   - Tags are lowercase and hyphenated (e.g. `automation-api`, not
#     `Automation API`).
#   - REUSE an existing tag. Before adding a tag, search this file and avoid
#     near-duplicates: don't add `k8s` (use `kubernetes`), `iac` (use
#     `infrastructure-as-code`), `pulumi-news` (use `announcements`),
#     `pulumi-service` (use `pulumi-cloud`), `gcp` (use `google-cloud`),
#     `c#`/`.net` (use `dotnet`).
#   - Only add a cloud-provider or feature tag if we expect multiple posts about
#     it.
#   - Keep the count low: every tag added makes the system harder to grok.
#   - The list below is canonical but not exhaustive â€” niche, one-off topical
#     tags (specific services, libraries, tools) live on individual posts and
#     are intentionally not all enumerated here.
#
# Slugs only; counts are approximate and drift as posts are added.

