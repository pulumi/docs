languageCode: en-us
title: Pulumi - Infrastructure as Code in Any Programming Language

refLinksErrorLevel: ERROR
security:
  funcs:
    getenv:
      - ASSET_BUNDLE_ID
      - CSS_BUNDLE_ID
      - PULUMI_CONVERT_URL
      - PULUMI_AI_WS_URL
      - GITHUB_TOKEN
      - ALGOLIA_APP_ID
      - ALGOLIA_APP_SEARCH_KEY

sectionPagesMenu: main
pygmentsCodeFences: true
pygmentsUseClasses: true

# We always generate the robots.txt file. But based on the environment
# built, it may disallow crawling.
enableRobotsTXT: true

# Enabling Git info allows us to have Hugo automatically set the lastmod date in sitemap
# XML with the date the file was last changed (according to Git).
enableGitInfo: true

# Some of our API docs pages are very large with many shortcodes, which can take
# a while to generate (especially in CI), so we raise the limit from the default
# 10 seconds to avoid timeouts when generating the site.
timeout: 300000

# Exclude static/programs from Hugo's file watcher. It's ~15 MiB / 2000+ files
# of code samples maintained by codegen, not during normal authoring — watching
# them just slows `hugo server` down. The files are still served; only the
# watch is disabled.
#
# Declaring a mount that overlaps `static` disables Hugo's default
# `static → static` mount, so we re-declare it. Other defaults (archetypes,
# assets, content, data, i18n, layouts, etc.) are still auto-added.
module:
  mounts:
    - source: static
      target: static
    - source: static/programs
      target: static/programs
      disableWatch: true

outputFormats:
  rss:
    baseName: rss
  llms:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true
    permalinkable: false
  markdown:
    mediaType: "text/markdown"
    baseName: "index"
    isPlainText: true
    notAlternative: true
  llmsitemap:
    mediaType: "application/json"
    baseName: "llm-sitemap"
    isPlainText: true
    notAlternative: true

# We set the outputs explicitly to just "HTML" as otherwise they default to both
# "HTML" and "RSS", and we only want to generate RSS for the blog section -- not
# all sections/taxonomies. We enable RSS as an output for the blog section alone
# in the front matter of content/blog/_index.md and have a custom RSS template
# in layouts/blog/rss.xml.
outputs:
  home:
    - HTML
    - JSON
    - llms
  section:
    - HTML
  page:
    - HTML

taxonomies:
  tag: tags
  author: authors
  collection: collections

permalinks:
  authors: /blog/author/:slug/
  tags: /blog/tag/:slug/
  collections: /tutorials/:slug/

markup:
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: false
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    parser:
      autoHeadingID: true
      autoHeadingIDType: "github"
      attribute:
        block: true
        title: true
    renderer:
      hardWraps: false
      unsafe: true
      xhtml: false

params:
    # CTA configuration
    cta:
        primary:
            label: "Get Started"
            label_short: "Sign up"
            href: "https://app.pulumi.com/signup"
        secondary:
            label: "Contact Us"
            href: "/contact/?form=sales"

    canonicalURL: https://www.pulumi.com
    contentRepositoryURL: https://github.com/pulumi/docs
    contentRepositoryBaseBranch: master
    registryRepositoryURL: https://github.com/pulumi/registry
    registryRepositoryBaseBranch: master
    meta_desc: |
        Pulumi's open source infrastructure as code SDK enables you to create, deploy,
        and manage infrastructure on any cloud, using your favorite languages.

    # Schema.org configuration
    schema:
        # Pulumi CLI version - dynamically updated by CI/CD
        pulumi_version: "3.198.0"

        # Performance optimization
        max_content_scan_length: 5000

minify:
  tdewolff:
    html:
      keepQuotes: true
