# Decap CMS configuration for Pulumi Docs blog
#
# Local backend (PoC) — works immediately with `make serve-cms`, no auth required.
# The CMS UI appears at http://localhost:1313/admin/; click "Login" to proceed.
# `local_backend: true` intercepts all backend calls and routes them to the local
# decap-server proxy, so no GitHub credentials are needed.
#
# To switch to the GitHub backend for production:
#   1. Remove `local_backend: true` below.
#   2. Update the backend block: remove the git-gateway name and uncomment the
#      github block, then set `base_url` to your OAuth proxy URL.
#   3. Register a GitHub OAuth App (callback: <oauth-proxy>/callback).
#   4. Deploy the OAuth proxy with GITHUB_CLIENT_ID and GITHUB_CLIENT_SECRET.

# Active for PoC — overridden by local_backend: true at runtime.
# For production, replace with:
#   name: github
#   repo: pulumi/docs
#   branch: master
#   base_url: https://<your-oauth-proxy-url>
backend:
  name: git-gateway

local_backend: true

# editorial_workflow creates a PR per post (supported by GitHub backend only).
# Uncomment for production after switching to the GitHub backend.
# publish_mode: editorial_workflow

media_folder: content/blog
public_folder: /blog

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: content/blog
    path: "{{slug}}/index"
    create: true
    media_folder: ""
    public_folder: ""
    fields:
      - label: Title
        name: title
        widget: string
        hint: "Keep under 60 characters for best SEO results."

      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false

      - label: Draft
        name: draft
        widget: boolean
        default: false

      - label: Meta description
        name: meta_desc
        widget: text
        hint: "Appears in search results. Keep under 160 characters."
        pattern:
          - "^.{1,160}$"
          - "Must be 160 characters or fewer"

      - label: Meta image
        name: meta_image
        widget: image
        hint: "Social share image. Typically named meta.png and stored in the post folder."
        required: false

      - label: Authors
        name: authors
        widget: list
        field:
          label: Author ID
          name: author
          widget: string
        hint: "Use the author's ID from data/team/team/ (e.g. 'meagan-cojocar')."

      - label: Tags
        name: tags
        widget: select
        multiple: true
        required: false
        options:
          - ai
          - ai-agents
          - architecture
          - automation-api
          - aws
          - azure
          - azure-top-5
          - best-practices
          - cloud-engineering
          - cloud-native
          - community
          - components
          - containers
          - continuous-delivery
          - crossguard
          - developer-experience-devex
          - devops
          - docker
          - eks
          - esc
          - features
          - google-cloud
          - governance
          - guest-post
          - iac
          - iac-best-practices
          - idp
          - infrastructure-as-code
          - infrastructure-lifecycle-management
          - insights
          - kubernetes
          - lambda
          - llm
          - migration
          - oidc
          - packages
          - platform-engineering
          - platform-engineering-pillars
          - policy-as-code
          - providers
          - pulumi-cloud
          - pulumi-enterprise
          - pulumi-events
          - pulumi-neo
          - pulumi-news
          - pulumi-releases
          - pulumi-service
          - python
          - releases
          - secrets
          - security
          - serverless
          - templates
          - terraform
          - testing
          - typescript
          - yaml
        hint: "Select all that apply. For a tag not in the list, add it directly to the file."

      - label: Allow long title
        name: allow_long_title
        widget: boolean
        default: false
        required: false

      - label: Updated date
        name: updated
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
        hint: "Set when refreshing a post with significant new content."

      - label: Series
        name: series
        widget: string
        required: false
        hint: "Slug of the series this post belongs to (e.g. 'pulumi-watch')."

      - label: Canonical URL
        name: canonical_url
        widget: string
        required: false
        hint: "Set for syndicated content originally published elsewhere."

      - label: Body
        name: body
        widget: markdown
        hint: "Place <!--more--> after the opening paragraph to set the excerpt shown in post listings."

  # Data source for the Authors relation widget above. Not intended for direct editing.
  - name: team
    label: Team Members
    folder: data/team/team
    extension: toml
    format: toml
    create: false
    identifier_field: id
    fields:
      - { label: ID, name: id, widget: string }
      - { label: Name, name: name, widget: string }
