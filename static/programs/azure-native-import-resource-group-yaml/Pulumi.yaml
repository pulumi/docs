name: azure-native-import-resource-group-yaml
description: An example that provides the code to import an existing resource group from Azure.
runtime: yaml

config:
  subscriptionId:
    type: string
  resourceGroupName:
    type: string

resources:
  importedResourceGroup:
    type: azure-native:resources:ResourceGroup
    properties:
      location: eastus
    options:
      import: /subscriptions/${subscriptionId}/resourceGroups/${resourceGroupName}
