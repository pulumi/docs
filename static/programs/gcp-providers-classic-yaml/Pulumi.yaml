name: gcp-providers-classic-yaml
description: An example that uses the GCP Classic provider to create a Cloud Storage bucket and a Cloud Run service.
runtime: yaml

resources:
  my-bucket:
    type: gcp:storage:Bucket
    properties:
      location: US
      uniformBucketLevelAccess: true
      forceDestroy: true

  my-service:
    type: gcp:cloudrunv2:Service
    properties:
      location: us-central1
      deletionProtection: false
      template:
        containers:
          - image: us-docker.pkg.dev/cloudrun/container/hello

outputs:
  bucketName: ${my-bucket.name}
  serviceUrl: ${my-service.uri}
