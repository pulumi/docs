# Maintains static/esc/latest-version (published at https://www.pulumi.com/esc/latest-version).
#
# Why this workflow still exists after the standalone ESC CLI docs were removed:
# the Pulumi ESC GitHub Action (pulumi/esc-action) v1 and v2 fetch that URL at runtime
# to decide which ESC version to install whenever a workflow doesn't pin a `version:`
# input. If the pointer goes stale (or 404s), those unpinned actions install the wrong
# version or fail outright. v3+ installs the Pulumi CLI and no longer reads this file,
# but v1/v2 remain in use, so this workflow keeps the pointer current.
#
# It used to also generate the `esc` CLI command reference; that was removed along with
# the standalone CLI docs, so this now only bumps the version pointer.
#
# Triggered by a repository_dispatch (type: esc-cli) from pulumi/esc on each release.

permissions: write-all # Equivalent to default permissions + id-token: write
env:
  ESC_ACTION_OIDC_AUTH: true
  ESC_ACTION_OIDC_ORGANIZATION: pulumi
  ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
  ESC_ACTION_ENVIRONMENT: github-secrets/pulumi-docs
  ESC_ACTION_EXPORT_ENVIRONMENT_VARIABLES: GITHUB_TOKEN=PULUMI_BOT_TOKEN

name: Pulumi ESC latest-version pointer
on:
  repository_dispatch:
    types:
      - esc-cli
  workflow_dispatch:
    inputs:
      version:
        description: "esc version (e.g. v0.13.1)"
        required: true
      skip_auto_merge:
        description: "Skip enabling auto-merge on the generated PR (for testing)"
        type: boolean
        default: false
jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch secrets from ESC
        id: esc-secrets
        uses: pulumi/esc-action@v3
      - name: checkout docs repo
        uses: actions/checkout@v7
      - name: set the esc version
        run: |
          echo "ESC_VERSION=${{ github.event.inputs.version || github.event.client_payload.ref }}" >> $GITHUB_ENV
      - name: Update latest version
        # The value must be a bare version with the leading "v" stripped and no trailing
        # whitespace/newline, so consumers' `fetch(...).text().trim()` yields a clean version.
        run: |
          VERSION_TAG=${{ env.ESC_VERSION }}
          printf '%s' "${VERSION_TAG#v}" > ./static/esc/latest-version
      - name: commit changes
        id: commit
        run: |
          git config --local user.email "bot@pulumi.com"
          git config --local user.name "pulumi-bot"
          git checkout -b esc/${{ github.run_id }}-${{ github.run_number }}
          git add static/esc/latest-version
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Update Pulumi ESC latest-version pointer to ${{ env.ESC_VERSION }}"
            git push origin esc/${{ github.run_id }}-${{ github.run_number }}
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      - name: pull-request
        id: create-pr
        if: steps.commit.outputs.has_changes == 'true'
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "esc/${{ github.run_id }}-${{ github.run_number }}"
          destination_branch: "master"
          pr_title: "Update Pulumi ESC latest-version pointer @${{ env.ESC_VERSION }}"
          pr_body: |
            Automated PR generated by the [`esc-cli.yml`](https://github.com/${{ github.repository }}/blob/master/.github/workflows/esc-cli.yml) workflow.

            Updates `static/esc/latest-version` (served at https://www.pulumi.com/esc/latest-version), which `pulumi/esc-action` v1/v2 read at runtime to resolve the ESC version to install.

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          pr_label: "automation/esc-cli-docs,automation/merge"
          github_token: ${{ steps.esc-secrets.outputs.PULUMI_BOT_TOKEN }}
      - name: Enable auto-merge
        if: steps.create-pr.outputs.pr_created == 'true' && github.event.inputs.skip_auto_merge != 'true'
        run: gh pr merge ${{ steps.create-pr.outputs.pr_number }} --auto --squash
        env:
          GITHUB_TOKEN: ${{ steps.esc-secrets.outputs.PULUMI_BOT_TOKEN }}
  notify:
    if: failure()
    name: Send slack notification
    runs-on: ubuntu-latest
    needs: [update-version]
    steps:
      - name: Fetch secrets from ESC
        id: esc-secrets
        uses: pulumi/esc-action@v3
      - name: Slack Notification
        uses: docker://sholung/action-slack-notify:v2.3.0
        env:
          SLACK_CHANNEL: docs-ops
          SLACK_COLOR: "#F54242"
          SLACK_MESSAGE: "esc latest-version pointer update failure in pulumi/docs repo :meow_sad:"
          SLACK_USERNAME: docsbot
          SLACK_WEBHOOK: ${{ steps.esc-secrets.outputs.SLACK_WEBHOOK_URL }}
          SLACK_ICON: https://www.pulumi.com/logos/brand/avatar-on-white.png
