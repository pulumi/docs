permissions: write-all # Equivalent to default permissions + id-token: write
env:
  ESC_ACTION_OIDC_AUTH: true
  ESC_ACTION_OIDC_ORGANIZATION: pulumi
  ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
  ESC_ACTION_ENVIRONMENT: github-secrets/pulumi-docs
  ESC_ACTION_EXPORT_ENVIRONMENT_VARIABLES: GITHUB_TOKEN=PULUMI_BOT_TOKEN

name: Pulumi SDK docs - .NET
on:
  repository_dispatch:
    types:
      - pulumi-dotnet-sdk
  workflow_dispatch:
    inputs:
      version:
        description: "pulumi-dotnet version (e.g. 3.0.0, with or without leading 'v')"
        required: true
      skip_auto_merge:
        description: "Skip enabling auto-merge on the generated PR (for testing)"
        type: boolean
        default: false
      publish_only:
        description: "Generate + publish the versioned snapshot only; skip the latest-docs PR (for backfill)"
        type: boolean
        default: false
      publish_versioned:
        description: "Also publish an immutable versioned snapshot to the archive bucket"
        type: boolean
        default: false
      target_env:
        description: "Versioned-docs publish target (when publishing)"
        type: choice
        options:
          - production
          - testing
        default: production

jobs:
  pull-request:
    runs-on: ubuntu-latest
    needs: build-pulumi-sdk-dotnet-docs
    if: needs.build-pulumi-sdk-dotnet-docs.outputs.has_changes == 'true' && github.event.inputs.publish_only != 'true'
    steps:
      - name: Fetch secrets from ESC
        id: esc-secrets
        uses: pulumi/esc-action@v2
      - name: checkout docs repo
        uses: actions/checkout@v6
      - name: set the pulumi-dotnet version
        env:
          RAW_VERSION: ${{ github.event.inputs.version || github.event.client_payload.ref }}
        run: |
          echo "DOTNET_SDK_VERSION=${RAW_VERSION#v}" >> $GITHUB_ENV
      - name: pull-request
        id: create-pr
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "pulumi-sdk-dotnet-docs/${{ github.run_id }}-${{ github.run_number }}"
          destination_branch: "master"
          pr_title: "Generate Pulumi SDK docs - .NET @v${{ env.DOTNET_SDK_VERSION }}"
          pr_body: |
            Automated PR generated by the [Pulumi SDK docs - .NET](https://github.com/${{ github.repository }}/blob/master/.github/workflows/pulumi-sdk-dotnet-docs.yml) workflow (`.github/workflows/pulumi-sdk-dotnet-docs.yml`).

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          pr_label: "automation/pulumi-sdk-dotnet-docs,automation/merge"
          github_token: ${{ steps.esc-secrets.outputs.PULUMI_BOT_TOKEN }}
      - name: Enable auto-merge
        if: steps.create-pr.outputs.pr_created == 'true' && github.event.inputs.skip_auto_merge != 'true'
        run: gh pr merge ${{ steps.create-pr.outputs.pr_number }} --auto --squash
        env:
          GITHUB_TOKEN: ${{ steps.esc-secrets.outputs.PULUMI_BOT_TOKEN }}
  build-pulumi-sdk-dotnet-docs:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.commit.outputs.has_changes }}
    steps:
      - name: Fetch secrets from ESC
        id: esc-secrets
        uses: pulumi/esc-action@v2
      - name: set the pulumi-dotnet version
        env:
          RAW_VERSION: ${{ github.event.inputs.version || github.event.client_payload.ref }}
        run: |
          echo "DOTNET_SDK_VERSION=${RAW_VERSION#v}" >> $GITHUB_ENV
      - name: checkout docs repo
        uses: actions/checkout@v6
        with:
          path: docs
      - name: checkout pulumi-dotnet repo
        uses: actions/checkout@v6
        with:
          repository: pulumi/pulumi-dotnet
          path: pulumi-dotnet
          ref: v${{ env.DOTNET_SDK_VERSION }}
          submodules: recursive
      - name: Install dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.x"
      - name: Install docfx
        run: dotnet tool install -g docfx
      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'yarn'
          cache-dependency-path: |
            docs/yarn.lock
            docs/infrastructure/yarn.lock
            docs/theme/yarn.lock
            docs/theme/stencil/yarn.lock
      - name: Install Vale (required by scripts/ensure.sh)
        run: |
          VALE_VERSION="3.14.1"
          VALE_SHA256="ff2b49ffaa9dcd246fd5008f03ff67746d2790b75bf4d3657e2fb9530fb96db3"
          curl -fsSL -o /tmp/vale.tar.gz "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
          echo "${VALE_SHA256}  /tmp/vale.tar.gz" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin vale -f /tmp/vale.tar.gz
          rm /tmp/vale.tar.gz
      - run: make ensure
        working-directory: docs
      - name: Generate .NET SDK docs
        run: ./scripts/run_docfx.sh
        working-directory: docs
        env:
          DOCFX_SDK_VERSION: ${{ env.DOTNET_SDK_VERSION }}
      - name: git status
        run: git status && git diff
        working-directory: docs
      - name: commit changes
        id: commit
        run: |
          git config --local user.email "bot@pulumi.com"
          git config --local user.name "pulumi-bot"
          git checkout -b pulumi-sdk-dotnet-docs/${{ github.run_id }}-${{ github.run_number }}
          git add static-prebuilt/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Regenerating Pulumi SDK .NET docs for pulumi-dotnet@${{ env.DOTNET_SDK_VERSION }}"
            if [ "${{ github.event.inputs.publish_only }}" != "true" ]; then
              git push origin pulumi-sdk-dotnet-docs/${{ github.run_id }}-${{ github.run_number }}
            fi
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
        working-directory: docs
      # --- Versioned docs: archive this SDK release as an immutable snapshot. ---------
      # Gated on publish_versioned (dispatch) or vars.VERSIONED_DOCS_ENABLED; real releases
      # are unaffected until that variable is set. Runs after commit, continue-on-error, so
      # a publish hiccup never blocks the docs PR.
      - name: Install Pulumi CLI (for the stack-output lookup below)
        if: ${{ github.event.inputs.publish_versioned == 'true' || vars.VERSIONED_DOCS_ENABLED == 'true' }}
        uses: pulumi/action-install-pulumi-cli@v1.0.1
      - name: Resolve versioned-docs publish target
        id: vdocs
        if: ${{ github.event.inputs.publish_versioned == 'true' || vars.VERSIONED_DOCS_ENABLED == 'true' }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ steps.esc-secrets.outputs.PULUMI_ACCESS_TOKEN }}
        run: |
          TARGET="${{ github.event.inputs.target_env || 'production' }}"
          if [ "$TARGET" = "testing" ]; then
            ROLE_ARN="arn:aws:iam::571684982431:role/versioned-docs-publisher-testing"
            BUCKET="pulumi-docs-versioned-testing"
            SITE="https://www.pulumi-test.io"
            WWW_STACK="pulumi/www.pulumi.com/www-testing"
          else
            ROLE_ARN="arn:aws:iam::388588623842:role/versioned-docs-publisher-production"
            BUCKET="pulumi-docs-versioned-production"
            SITE="https://www.pulumi.com"
            WWW_STACK="pulumi/www.pulumi.com/www-production"
          fi
          # Resolve the CloudFront distribution id from the IaC stack output that OWNS it, never
          # a hardcoded/assumed-static id (mirrors scripts/run-pulumi.sh and the registry repo's
          # invalidate-docs-cdn.sh). If it can't be read - no token, stack unreadable, or the
          # distribution was recreated - emit an empty id; publish-version.sh then skips the
          # post-publish CloudFront invalidation, bounding staleness to the manifest's 300s TTL
          # rather than failing the publish.
          DIST_ID="$(pulumi stack output cloudFrontDistributionId --stack "$WWW_STACK" 2>/dev/null || true)"
          if [ -z "$DIST_ID" ]; then
            echo "::warning::versioned-docs: could not read cloudFrontDistributionId from $WWW_STACK; publishing without a CloudFront invalidation (staleness bounded by the 300s manifest TTL)."
          fi
          {
            echo "role_arn=$ROLE_ARN"
            echo "bucket=$BUCKET"
            echo "distribution_id=$DIST_ID"
            echo "site=$SITE"
          } >> "$GITHUB_OUTPUT"
      - name: Configure AWS credentials (versioned-docs publisher)
        if: ${{ steps.vdocs.outputs.bucket != '' }}
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ steps.vdocs.outputs.role_arn }}
          role-session-name: versioned-docs-sdk-publish
          aws-region: us-west-2
      - name: Publish versioned snapshot
        if: ${{ steps.vdocs.outputs.bucket != '' }}
        continue-on-error: true
        working-directory: docs
        run: |
          # Backfill (publish_only) archives an OLD release: do not mark it "latest".
          EXTRA=()
          [ "${{ github.event.inputs.publish_only }}" = "true" ] && EXTRA+=(--no-mark-latest)
          ./scripts/versioned-docs/publish-version.sh --tool dotnet \
            --version "v${{ env.DOTNET_SDK_VERSION }}" \
            --src static-prebuilt/docs/reference/pkg/dotnet \
            --live-root /docs/reference/pkg/dotnet/ \
            --bucket "${{ steps.vdocs.outputs.bucket }}" --label ".NET SDK" \
            --distribution-id "${{ steps.vdocs.outputs.distribution_id }}" \
            --site "${{ steps.vdocs.outputs.site }}" \
            "${EXTRA[@]}"
  notify:
    if: failure()
    name: Send slack notification
    runs-on: ubuntu-latest
    needs: [pull-request, build-pulumi-sdk-dotnet-docs]
    steps:
      - name: Fetch secrets from ESC
        id: esc-secrets
        uses: pulumi/esc-action@v2
      - name: Slack Notification
        uses: docker://sholung/action-slack-notify:v2.3.0
        env:
          SLACK_CHANNEL: docs-ops
          SLACK_COLOR: "#F54242"
          SLACK_MESSAGE: "Pulumi SDK docs - .NET build failure in pulumi/docs repo"
          SLACK_USERNAME: docsbot
          SLACK_WEBHOOK: ${{ steps.esc-secrets.outputs.SLACK_WEBHOOK_URL }}
          SLACK_ICON: https://www.pulumi.com/logos/brand/avatar-on-white.png
