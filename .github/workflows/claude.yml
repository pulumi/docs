name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch secrets from ESC
        id: esc-secrets
        uses: pulumi/esc-action@v1

      - name: Check repository write access
        id: check-access
        run: |
          # Check if user who invoked Claude has write access to the repository
          OWNER="pulumi"
          REPO="docs"

          # Determine the author based on event type
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            AUTHOR="${{ github.event.comment.user.login }}"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ]; then
            AUTHOR="${{ github.event.comment.user.login }}"
          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            AUTHOR="${{ github.event.review.user.login }}"
          elif [ "${{ github.event_name }}" = "issues" ]; then
            AUTHOR="${{ github.event.issue.user.login }}"
          else
            AUTHOR="unknown"
          fi

          # Get user's permission level (admin, write, read, or none)
          PERMISSION=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/collaborators/$AUTHOR/permission" \
            | jq -r '.permission // "none"')

          # Allow admin or write access
          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "write" ]]; then
            echo "has_write_access=true" >> $GITHUB_OUTPUT
            echo "✓ User $AUTHOR has $PERMISSION access to $OWNER/$REPO"
          else
            echo "has_write_access=false" >> $GITHUB_OUTPUT
            echo "✗ User $AUTHOR has $PERMISSION access to $OWNER/$REPO (insufficient permissions)"
          fi

      - name: Resolve PR context
        id: pr-context
        if: steps.check-access.outputs.has_write_access == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Determine if this mention is on a PR (vs an issue) and look up
          # whether a pinned Claude review already exists. If yes, the prompt
          # invokes the re-entrant update skill; if no, it falls back to a
          # full initial review.
          PR_NUMBER=""
          IS_PR="false"
          case "${{ github.event_name }}" in
            issue_comment)
              if [ "${{ github.event.issue.pull_request != null }}" = "true" ]; then
                PR_NUMBER="${{ github.event.issue.number }}"
                IS_PR="true"
              fi
              ;;
            pull_request_review_comment|pull_request_review)
              PR_NUMBER="${{ github.event.pull_request.number }}"
              IS_PR="true"
              ;;
          esac

          HAS_PINNED="false"
          if [ "$IS_PR" = "true" ] && [ -n "$PR_NUMBER" ]; then
            PINNED_IDS=$(bash .claude/commands/_common/scripts/pinned-comment.sh \
              find --pr "$PR_NUMBER" --repo "${{ github.repository }}" || true)
            if [ -n "$PINNED_IDS" ]; then
              HAS_PINNED="true"
            fi
          fi

          {
            echo "pr_number=$PR_NUMBER"
            echo "is_pr=$IS_PR"
            echo "has_pinned=$HAS_PINNED"
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        if: steps.check-access.outputs.has_write_access == 'true'
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Use bot token so pushes trigger downstream workflows (e.g., social review)
          github_token: ${{ steps.esc-secrets.outputs.PULUMI_BOT_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Re-entrant updates run on Sonnet (initial review uses Opus in
          # claude-code-review.yml). On a PR with an existing pinned review,
          # invoke _common/update-review.md; otherwise fall back to a full
          # initial review via docs-review-ci.md. On non-PR events, behave
          # like the default @claude handler.
          prompt: |
            ${{ steps.pr-context.outputs.is_pr == 'true' && steps.pr-context.outputs.has_pinned == 'true' && format('You are running in a CI environment.

            A pinned Claude review already exists on PR #{0}. Update it in place by following the instructions in `.claude/commands/_common/update-review.md`. The mention that triggered you is in the event payload — read it via `gh api` if you need the body. Use `bash .claude/commands/_common/scripts/pinned-comment.sh upsert` to post the updated review.', steps.pr-context.outputs.pr_number)
            || (steps.pr-context.outputs.is_pr == 'true' && format('You are running in a CI environment.

            No pinned Claude review exists on PR #{0}. Run an initial review by following the instructions in `.claude/commands/docs-review-ci.md`, then post via `bash .claude/commands/_common/scripts/pinned-comment.sh upsert`.', steps.pr-context.outputs.pr_number))
            || ''
            }}

          claude_args: '--model claude-sonnet-4-6 --allowed-tools "Read,Glob,Grep,Edit,Write,Agent,WebFetch,WebSearch,Bash(gh pr:*),Bash(gh issue:*),Bash(gh api:*),Bash(gh search:*),Bash(gh release:*),Bash(git:*),Bash(bash .claude/commands/_common/scripts/pinned-comment.sh:*)"'

env:
  ESC_ACTION_OIDC_AUTH: true
  ESC_ACTION_OIDC_ORGANIZATION: pulumi
  ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
  ESC_ACTION_ENVIRONMENT: github-secrets/pulumi-docs
  ESC_ACTION_EXPORT_ENVIRONMENT_VARIABLES: false

