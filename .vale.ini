StylesPath = styles

# Hide suggestion-level rules; surface warnings and errors only.
# Vale findings are nags routed to the docs-review pipeline; suggestions
# are too noisy on existing technical prose to be useful.
MinAlertLevel = warning

Packages = Google, write-good

[*.md]
BasedOnStyles = Pulumi, Google, write-good

# Skip Hugo shortcodes in both forms ({{< >}} and {{% %}}), including
# closing tags. Vale would otherwise treat them as prose and false-flag
# attribute names and template arguments.
BlockIgnores = (?s) *({{[%<].*?[%>]}}.*?{{[%<] */[a-zA-Z][a-zA-Z0-9_-]* *[%>]}}), \
               (?s) *({{[%<].*?[%>]}})
TokenIgnores = ({{[%<].*?[%>]}}), \
               (\{\{[^}]+\}\})

# Disable Google rules that conflict with Pulumi house style.
Google.Headings = NO        # Pulumi uses Title Case for H1 (markdownlint covers H2+).
Google.WordList = NO        # Google product-name overrides don't match Pulumi terminology.
Google.We = NO              # Documentation style allows first-person plural.
Google.Will = NO            # Too noisy on declarative technical prose.
Google.Parens = NO          # Vague rule ("use parens judiciously"); not actionable.
Google.EmDash = NO          # Noisy on existing technical prose; false-positive rate exceeds signal.
Google.Colons = NO          # Flags all ': A' but Google's guide permits capital after a colon when a complete sentence follows ("Note: This operation...").
Google.Latin = NO           # 'e.g.' / 'i.e.' are dev-doc standard; 303 historical cases in docs/.
Google.Exclamation = NO     # 97% of hits are in blog posts where exclamations are voice, not error.

# Disable write-good rules that double-flag with Google or are impractical.
write-good.Passive = NO     # Google.Passive covers the same ground; one finding per construct.
write-good.E-Prime = NO     # Banning all forms of "to be" is impractical for technical docs.

# Per-path overrides. Vale merges sections; more-specific wins on conflicts.
[content/blog/**/*.md]
Google.FirstPerson = NO     # Blog posts are written in author voice; 'I'/'my'/'me' are the medium.
