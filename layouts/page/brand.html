{{ define "hero" }}
    {{ partial "hero" (dict "title" .Params.title ) }}
{{ end }}

{{ define "main" }}
    {{ with .Params.sections }}
    <nav>
        <div class="container mx-auto">
            <pulumi-tertiary-nav items="{{ . | jsonify }}"></pulumi-tertiary-nav>
        </div>
    </nav>
    {{ end }}

    <section>
        <div class="container mx-auto max-w-4xl pt-8 text-center">
            <p>Find Pulumi's official logos, colors, and brand guidelines on our brand site.</p>
            <a class="btn btn-primary btn-xl" href="https://brand.pulumi.com/" target="_blank" rel="noreferrer noopener">Visit brand.pulumi.com</a>
        </div>
    </section>

{{ end }}
