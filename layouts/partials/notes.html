{{ $type := default "info" .type }}
{{ $icon := "info" }}

{{ if eq $type "warning" }}
    {{ $icon = "warning" }}
{{ end }}

<div class="note note-{{ $type }}">
    <div class="icon-and-line">
        {{ partial "icon.html" (dict "name" $icon "weight" "fill") }}
        <div class="line"></div>
    </div>
    <div class="content">
        {{ .text }}
    </div>
</div>
