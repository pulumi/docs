<!--
    Forwards the landing page's querystring (utm_*, gclid, etc.) to every
    app.pulumi.com link so paid-traffic attribution survives the click into
    the signup flow.
-->
<script>
document.addEventListener("DOMContentLoaded", function() {
    var qs = window.location.search;
    if (qs.length <= 1) return;
    var params = qs.substring(1);
    document.querySelectorAll('a[href*="app.pulumi.com"]').forEach(function(a) {
        a.href += (a.href.indexOf("?") === -1 ? "?" : "&") + params;
    });
});
</script>
