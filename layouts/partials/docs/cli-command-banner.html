{{- $version := "" -}}
{{- $toolLabel := "" -}}
{{- if eq .Params.cli_tool "pulumi" -}}
    {{- $version = readFile "/static/latest-version" -}}
    {{- $toolLabel = "Pulumi CLI" -}}
{{- end -}}
{{- if $version -}}
<p class="cli-command-version">
    Generated for {{ $toolLabel }} <code>v{{ $version }}</code>.
</p>
{{- end -}}
