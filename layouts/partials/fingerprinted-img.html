{{ $img := resources.Get (printf "fingerprinted/%s" .src) }}
{{ if ne $img.MediaType.SubType "svg" }}
    {{ $img = $img.Process "webp q80" }}
{{ end }}
{{ $img = $img | fingerprint }}
<img {{ with .class }}class="{{ . }}"{{ end }} src="{{ $img.RelPermalink }}" {{ with .alt }}alt="{{ . }}"{{ end }} {{ with .style }}style="{{ . }}"{{ end }} />
