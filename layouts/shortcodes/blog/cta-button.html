{{ $label := .Get 0 }}
{{ $url := .Get 1 }}
{{ $target := .Get 2 }}


<a
    href="{{ $url }}"
    class="btn btn-outline"
    {{ if $target }}target="{{ $target }}"{{ end }}
    {{ if eq $target "_blank" }}rel="noopener noreferrer"{{ end }}
>
    {{ $label }}
    {{ if eq $target "_blank" }}
        {{ partial "icon.html" (dict "name" "arrow-square-out" "class" "text-sm ml-2") }}
    {{ end }}
</a>
