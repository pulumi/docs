{{ $type := default "info" (.Get "type") }}
{{ $icon := "info" }}

{{ if eq $type "tip" }}
    {{ $icon = "lightbulb" }}
{{ end }}

{{ if eq $type "warning" }}
    {{ $icon = "warning" }}
{{ end }}


<div class="note note-{{ $type }}">
    <div class="icon-and-line">
        <i class="ph ph-{{ $icon }}"></i>
        <div class="line"></div>
    </div>
    <div class="content">
        {{- .Inner | markdownify -}}
    </div>
</div>
