{{ define "hero" }}
    {{ if .Parent.IsHome }}
        {{ partial "hero" (dict "title" .Params.title) }}
    {{ end }}
{{ end }}

{{ define "main" }}
    {{ if .Parent.IsHome }}
        {{ partial "resources/hub-page.html" . }}
    {{ else }}
        {{ partial "resources/category-page.html" . }}
    {{ end }}
{{ end }}
