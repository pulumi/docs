{{ $icon := dict
"caution" "warning"
"important" "star"
"note" "pencil"
"info" "info"
"tip" "lightbulb"
"warning" "warning"
}}

<div class="note note-{{ .AlertType }}">
    <div class="icon-and-line">
        <i class="ph ph-{{ index $icon .AlertType }}"></i>
        <div class="line"></div>
    </div>
    <div class="content">
        {{- .Text -}}
    </div>
</div>
