{{ $icon := dict
"caution" "warning"
"important" "star"
"note" "pencil-simple"
"info" "info"
"tip" "lightbulb"
"warning" "warning"
}}

<div class="note note-{{ .AlertType }}">
    <div class="icon-and-line">
        {{ partial "icon.html" (dict "name" (index $icon .AlertType)) }}
        <div class="line"></div>
    </div>
    <div class="content">
        {{- .Text -}}
    </div>
</div>
